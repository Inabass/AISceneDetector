<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Scene Detector</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Yu Gothic", "Meiryo", Arial, Helvetica, sans-serif;
        background: #f5f6f7;
        color: #202124;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 20px 48px;
      }
      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        padding-bottom: 18px;
        border-bottom: 1px solid #d9dde3;
      }
      h1 { font-size: 28px; margin: 0 0 6px; }
      h2 { font-size: 18px; margin: 0 0 12px; }
      h3 { font-size: 14px; margin: 0 0 8px; }
      p { color: #5f6368; line-height: 1.5; margin: 0; }
      button, input, select, textarea {
        font: inherit;
      }
      button {
        border: 1px solid #1b5e46;
        background: #1f7a5a;
        color: #ffffff;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
        min-height: 38px;
      }
      button.secondary {
        border-color: #c3c8cf;
        background: #ffffff;
        color: #202124;
      }
      button:disabled {
        opacity: .55;
        cursor: default;
      }
      input, select, textarea {
        width: 100%;
        border: 1px solid #cbd1d8;
        border-radius: 6px;
        padding: 8px 10px;
        background: #ffffff;
        color: #202124;
      }
      label {
        display: grid;
        gap: 6px;
        color: #3c4043;
        font-size: 13px;
      }
      section {
        margin-top: 18px;
        padding: 18px;
        border: 1px solid #d9dde3;
        border-radius: 8px;
        background: #ffffff;
      }
      .status {
        min-width: 260px;
        border: 1px solid #c6d8ce;
        background: #edf7f1;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.55;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: end;
        flex-wrap: wrap;
      }
      .row > label { flex: 1 1 180px; }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .result {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 6px;
        background: #f1f3f4;
        color: #3c4043;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        min-height: 38px;
      }
      .list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }
      .item {
        border-top: 1px solid #eceff3;
        padding-top: 10px;
      }
      .item:first-child {
        border-top: 0;
        padding-top: 0;
      }
      .meta {
        color: #5f6368;
        font-size: 12px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }
      .media {
        display: grid;
        grid-template-columns: minmax(120px, 220px) minmax(180px, 1fr);
        gap: 10px;
        margin-top: 8px;
        align-items: start;
      }
      img, video {
        width: 100%;
        max-height: 220px;
        border: 1px solid #d9dde3;
        border-radius: 6px;
        background: #111;
      }
      a { color: #0b57d0; }
      @media (max-width: 720px) {
        header { display: block; }
        .status { margin-top: 14px; min-width: 0; }
        .media { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI Scene Detector</h1>
          <p>学習、特徴量抽出、モデル生成、検出、シーン出力をこの画面から実行します。</p>
        </div>
        <div class="status" id="systemStatus">状態を確認中...</div>
      </header>

      <section>
        <h2>1. 学習動画</h2>
        <div class="grid">
          <label>ラベル
            <select id="trainingLabel">
              <option value="positive">positive</option>
              <option value="negative">negative</option>
            </select>
          </label>
          <label>学習動画
            <input id="trainingFile" type="file" accept="video/*">
          </label>
        </div>
        <div class="actions">
          <button id="uploadTraining">学習動画を登録</button>
          <button class="secondary" id="extractFeatures">特徴量を生成</button>
        </div>
        <div class="result" id="trainingResult">未実行</div>
      </section>

      <section>
        <h2>ジョブ</h2>
        <div class="row">
          <label>ジョブID
            <input id="jobId" type="number" min="1" value="1">
          </label>
        </div>
        <div class="actions">
          <button class="secondary" id="loadJobs">ジョブ一覧を更新</button>
          <button class="secondary" id="loadJobDetail">ジョブ詳細を表示</button>
          <button class="secondary" id="loadJobLogs">ジョブログを表示</button>
        </div>
        <div class="result" id="jobResult">ジョブの状態とログを確認できます。</div>
        <div class="list" id="jobsList"></div>
        <div class="list" id="jobLogsList"></div>
      </section>

      <section>
        <h2>ストレージ</h2>
        <div class="grid">
          <label>cleanup対象
            <select id="cleanupTarget">
              <option value="temp,previews,thumbnails">temp + previews + thumbnails</option>
              <option value="temp">temp</option>
              <option value="previews">previews</option>
              <option value="thumbnails">thumbnails</option>
            </select>
          </label>
          <label>対象経過時間
            <input id="cleanupOlderHours" type="number" min="0" step="1" value="24">
          </label>
        </div>
        <div class="actions">
          <button class="secondary" id="loadStorage">容量を確認</button>
          <button class="secondary" id="estimateCleanup">cleanup見積もり</button>
          <button class="secondary" id="runCleanup">cleanup実行</button>
        </div>
        <div class="result" id="storageResult">派生物と一時ファイルの容量を確認できます。</div>
        <div class="list" id="storageList"></div>
      </section>

      <section>
        <h2>2. モデル</h2>
        <div class="grid">
          <label>モデル名
            <input id="modelName" value="sample-model">
          </label>
          <label>説明
            <input id="modelDescription" value="UIから作成">
          </label>
          <label>モデルID
            <input id="modelId" type="number" min="1" value="1">
          </label>
          <label>フィードバック
            <select id="includeFeedback">
              <option value="false">使わない</option>
              <option value="true">再学習に含める</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="createModel">モデルを作成</button>
          <button class="secondary" id="trainModel">モデルを学習</button>
          <button class="secondary" id="loadModel">モデルを確認</button>
        </div>
        <div class="result" id="modelResult">未実行</div>
        <div class="list" id="modelVersionsList"></div>
      </section>

      <section>
        <h2>3. 検出</h2>
        <div class="grid">
          <label>対象動画
            <input id="detectionFile" type="file" accept="video/*">
          </label>
          <label>frame_interval_sec
            <input id="frameInterval" type="number" min="0.1" step="0.1" value="1.0">
          </label>
          <label>batch_size
            <input id="batchSize" type="number" min="1" step="1" value="16">
          </label>
        </div>
        <div class="actions">
          <button id="runDetection">検出を開始</button>
          <button class="secondary" id="loadDetections">検出結果を更新</button>
          <button class="secondary" id="loadSegments">選択中のシーンを表示</button>
        </div>
        <div class="result" id="detectionResult">未実行</div>
        <div class="list" id="detectionsList"></div>
        <div class="list" id="segmentsList"></div>
      </section>

      <section>
        <h2>4. フィードバック</h2>
        <div class="row">
          <label>フィードバック確認対象の検出結果ID
            <input id="feedbackDetectionId" type="number" min="1" value="1">
          </label>
        </div>
        <div class="actions">
          <button class="secondary" id="loadFeedback">フィードバック一覧を更新</button>
        </div>
        <div class="result" id="feedbackResult">シーン一覧のボタンから正しい/誤検出/無視を記録できます。</div>
        <div class="list" id="feedbackList"></div>
      </section>

      <section>
        <h2>5. 出力とプレビュー</h2>
        <div class="row">
          <label>検出結果ID
            <input id="exportDetectionId" type="number" min="1" value="1">
          </label>
          <label>mode
            <select id="exportMode">
              <option value="copy">copy</option>
              <option value="reencode">reencode</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="createExport">シーンを出力</button>
          <button class="secondary" id="loadExports">出力一覧を更新</button>
        </div>
        <div class="result" id="exportResult">未実行</div>
        <div class="list" id="exportsList"></div>
      </section>
    </main>

    <script>
      const state = {
        trainingVideoId: null,
        detectionId: null,
        lastJobId: null,
      };

      const $ = (id) => document.getElementById(id);

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function print(id, value) {
        $(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      function formatBytes(bytes) {
        const value = Number(bytes || 0);
        if (value < 1024) return `${value} B`;
        if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
        if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
        return `${(value / 1024 / 1024 / 1024).toFixed(2)} GB`;
      }

      async function api(path, options = {}) {
        const response = await fetch(path, options);
        const payload = await response.json();
        if (!response.ok || payload.error) {
          throw new Error(JSON.stringify(payload.error || payload, null, 2));
        }
        return payload.data;
      }

      async function refreshSystemStatus() {
        try {
          const [health, gpu, tools] = await Promise.all([
            api("/api/v1/health"),
            api("/api/v1/gpu"),
            api("/api/v1/system/video-tools"),
          ]);
          const ffmpeg = tools.find((tool) => tool.name === "ffmpeg");
          const ffprobe = tools.find((tool) => tool.name === "ffprobe");
          $("systemStatus").textContent =
            `API ${health.status} / DB ${health.database}\n` +
            `CUDA ${gpu.cuda_available ? "利用可" : "不可"} / ${gpu.device_name || "-"}\n` +
            `ffmpeg ${ffmpeg?.available ? "OK" : "NG"} / ffprobe ${ffprobe?.available ? "OK" : "NG"}`;
        } catch (error) {
          $("systemStatus").textContent = `状態確認に失敗しました\n${error.message}`;
        }
      }

      async function pollJob(jobId, targetId) {
        state.lastJobId = jobId;
        $("jobId").value = jobId;
        for (;;) {
          const job = await api(`/api/v1/jobs/${jobId}`);
          print(targetId, job);
          if (["succeeded", "failed", "cancelled"].includes(job.status)) {
            return job;
          }
          await new Promise((resolve) => setTimeout(resolve, 1500));
        }
      }

      async function loadJobs() {
        const jobs = await api("/api/v1/jobs");
        $("jobsList").innerHTML = jobs.map((job) => `
          <div class="item">
            <h3>Job ${job.id} / ${job.status}</h3>
            <div class="meta">
              type=${escapeHtml(job.type)} / progress=${job.progress}% /
              step=${escapeHtml(job.current_step || "-")}<br>
              ${job.error_code ? `error=${escapeHtml(job.error_code)} / ${escapeHtml(job.error_message || "")}` : ""}
            </div>
            <div class="actions">
              <button class="secondary" data-job="${job.id}">このジョブを選択</button>
              ${["failed", "cancelled"].includes(job.status) ? `<button class="secondary" data-retry-job="${job.id}">再試行</button>` : ""}
            </div>
          </div>
        `).join("") || "<p>ジョブはまだありません。</p>";
        $("jobsList").querySelectorAll("[data-job]").forEach((button) => {
          button.addEventListener("click", async () => {
            $("jobId").value = button.dataset.job;
            await loadJobDetail();
            await loadJobLogs();
          });
        });
        $("jobsList").querySelectorAll("[data-retry-job]").forEach((button) => {
          button.addEventListener("click", async () => {
            await retryJob(Number(button.dataset.retryJob));
          });
        });
      }

      async function loadJobDetail() {
        const job = await api(`/api/v1/jobs/${Number($("jobId").value)}`);
        print("jobResult", job);
      }

      async function loadJobLogs() {
        const logs = await api(`/api/v1/jobs/${Number($("jobId").value)}/logs`);
        $("jobLogsList").innerHTML = logs.map((log) => `
          <div class="item">
            <h3>${escapeHtml(log.level)} / ${escapeHtml(log.step || "-")}</h3>
            <div class="meta">
              ${escapeHtml(log.created_at)}<br>
              ${escapeHtml(log.message)}<br>
              ${log.details ? escapeHtml(JSON.stringify(log.details)) : ""}
            </div>
          </div>
        `).join("") || "<p>ログはありません。</p>";
      }

      async function retryJob(jobId) {
        try {
          const job = await api(`/api/v1/jobs/${jobId}/retry`, { method: "POST" });
          $("jobId").value = job.id;
          print("jobResult", job);
          await loadJobs();
        } catch (error) {
          print("jobResult", error.message);
        }
      }

      $("loadJobs").addEventListener("click", async () => {
        try {
          await loadJobs();
        } catch (error) {
          print("jobResult", error.message);
        }
      });

      $("loadJobDetail").addEventListener("click", async () => {
        try {
          await loadJobDetail();
        } catch (error) {
          print("jobResult", error.message);
        }
      });

      $("loadJobLogs").addEventListener("click", async () => {
        try {
          await loadJobLogs();
        } catch (error) {
          print("jobResult", error.message);
        }
      });

      async function loadStorage() {
        const usage = await api("/api/v1/system/storage");
        print("storageResult", {
          storage_root: usage.storage_root,
          total: formatBytes(usage.total_bytes),
        });
        $("storageList").innerHTML = usage.areas.map((area) => `
          <div class="item">
            <h3>${escapeHtml(area.name)}</h3>
            <div class="meta">
              ${escapeHtml(area.path)}<br>
              files=${area.file_count} / size=${formatBytes(area.total_bytes)}
            </div>
          </div>
        `).join("");
      }

      function cleanupPayload(dryRun) {
        return {
          dry_run: dryRun,
          targets: $("cleanupTarget").value.split(","),
          older_than_hours: Number($("cleanupOlderHours").value),
        };
      }

      async function cleanupStorage(dryRun) {
        const result = await api("/api/v1/system/cleanup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(cleanupPayload(dryRun)),
        });
        print("storageResult", {
          ...result,
          deleted_bytes_human: formatBytes(result.deleted_bytes),
          targets: result.targets.map((target) => ({
            ...target,
            total: formatBytes(target.total_bytes),
          })),
        });
        await loadStorage();
      }

      $("loadStorage").addEventListener("click", async () => {
        try {
          await loadStorage();
        } catch (error) {
          print("storageResult", error.message);
        }
      });

      $("estimateCleanup").addEventListener("click", async () => {
        try {
          await cleanupStorage(true);
        } catch (error) {
          print("storageResult", error.message);
        }
      });

      $("runCleanup").addEventListener("click", async () => {
        try {
          await cleanupStorage(false);
        } catch (error) {
          print("storageResult", error.message);
        }
      });

      $("uploadTraining").addEventListener("click", async () => {
        try {
          const file = $("trainingFile").files[0];
          if (!file) throw new Error("学習動画を選択してください。");
          const form = new FormData();
          form.append("label_type", $("trainingLabel").value);
          form.append("file", file);
          const data = await api("/api/v1/training/videos", { method: "POST", body: form });
          state.trainingVideoId = data.id;
          print("trainingResult", data);
        } catch (error) {
          print("trainingResult", error.message);
        }
      });

      $("extractFeatures").addEventListener("click", async () => {
        try {
          if (!state.trainingVideoId) throw new Error("先に学習動画を登録してください。");
          const data = await api(`/api/v1/training/videos/${state.trainingVideoId}/features`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ frame_interval_sec: 1.0, batch_size: 16 }),
          });
          await pollJob(data.id, "trainingResult");
        } catch (error) {
          print("trainingResult", error.message);
        }
      });

      $("createModel").addEventListener("click", async () => {
        try {
          const data = await api("/api/v1/models", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: $("modelName").value,
              description: $("modelDescription").value,
            }),
          });
          $("modelId").value = data.id;
          print("modelResult", data);
        } catch (error) {
          print("modelResult", error.message);
        }
      });

      $("trainModel").addEventListener("click", async () => {
        try {
          const modelId = Number($("modelId").value);
          const data = await api(`/api/v1/models/${modelId}/train`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              threshold: null,
              include_feedback: $("includeFeedback").value === "true",
            }),
          });
          await pollJob(data.id, "modelResult");
          const model = await api(`/api/v1/models/${modelId}`);
          print("modelResult", model);
          renderModelVersions(model);
        } catch (error) {
          print("modelResult", error.message);
        }
      });

      $("loadModel").addEventListener("click", async () => {
        try {
          const data = await api(`/api/v1/models/${Number($("modelId").value)}`);
          print("modelResult", data);
          renderModelVersions(data);
        } catch (error) {
          print("modelResult", error.message);
        }
      });

      function renderModelVersions(model) {
        $("modelVersionsList").innerHTML = model.versions.map((version) => {
          const isActive = model.active_version_id === version.id;
          const metrics = version.metrics || {};
          const thresholds = version.thresholds || {};
          return `
            <div class="item">
              <h3>${escapeHtml(version.version)} ${isActive ? "/ 有効" : ""}</h3>
              <div class="meta">
                version_id=${version.id} / status=${escapeHtml(version.status)} / job_id=${version.created_by_job_id ?? "-"}<br>
                threshold=${Number(thresholds.positive ?? 0).toFixed(4)} / margin=${Number(thresholds.margin ?? 0).toFixed(4)}<br>
                positive_vectors=${metrics.positive_vector_count ?? 0} /
                negative_vectors=${metrics.negative_vector_count ?? 0}<br>
                ${escapeHtml(version.artifact_path)}
              </div>
              <div class="actions">
                <button class="secondary" data-rollback-version="${version.id}" ${isActive || version.status !== "ready" ? "disabled" : ""}>
                  このバージョンに戻す
                </button>
              </div>
            </div>
          `;
        }).join("") || "<p>モデルバージョンはまだありません。</p>";
        $("modelVersionsList").querySelectorAll("[data-rollback-version]").forEach((button) => {
          button.addEventListener("click", async () => {
            await rollbackModel(model.id, Number(button.dataset.rollbackVersion));
          });
        });
      }

      async function rollbackModel(modelId, versionId) {
        try {
          const model = await api(`/api/v1/models/${modelId}/rollback`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ version_id: versionId }),
          });
          print("modelResult", model);
          renderModelVersions(model);
        } catch (error) {
          print("modelResult", error.message);
        }
      }

      $("runDetection").addEventListener("click", async () => {
        try {
          const file = $("detectionFile").files[0];
          if (!file) throw new Error("対象動画を選択してください。");
          const form = new FormData();
          form.append("model_id", $("modelId").value);
          form.append("frame_interval_sec", $("frameInterval").value);
          form.append("batch_size", $("batchSize").value);
          form.append("file", file);
          const data = await api("/api/v1/detections", { method: "POST", body: form });
          const job = await pollJob(data.id, "detectionResult");
          await loadDetections();
          print("detectionResult", job);
        } catch (error) {
          print("detectionResult", error.message);
        }
      });

      async function loadDetections() {
        const detections = await api("/api/v1/detections");
        $("detectionsList").innerHTML = detections.map((item) => `
          <div class="item">
            <h3>検出ID ${item.id} / ${item.status}</h3>
            <div class="meta">${escapeHtml(item.source_filename)} / model_version_id=${item.model_version_id} / segments=${item.summary?.segment_count ?? "-"}</div>
            <div class="actions">
          <button class="secondary" data-detection="${item.id}">この検出を選択</button>
            </div>
          </div>
        `).join("");
        $("detectionsList").querySelectorAll("[data-detection]").forEach((button) => {
          button.addEventListener("click", () => {
            state.detectionId = Number(button.dataset.detection);
            $("exportDetectionId").value = state.detectionId;
            $("feedbackDetectionId").value = state.detectionId;
            loadSegments();
          });
        });
      }

      $("loadDetections").addEventListener("click", async () => {
        try {
          await loadDetections();
        } catch (error) {
          print("detectionResult", error.message);
        }
      });

      async function loadSegments() {
        const detectionId = state.detectionId || Number($("exportDetectionId").value);
        const segments = await api(`/api/v1/detections/${detectionId}/segments`);
        $("segmentsList").innerHTML = segments.map((segment) => `
          <div class="item">
            <h3>シーン ${segment.segment_index}</h3>
            ${segment.metadata?.thumbnail_url ? `
              <div class="media">
                <a href="${escapeHtml(segment.metadata.thumbnail_url)}" target="_blank">
                  <img src="${escapeHtml(segment.metadata.thumbnail_url)}" alt="シーンサムネイル">
                </a>
                <div class="meta">
                  代表時刻 ${segment.representative_timestamp_sec.toFixed(3)}s<br>
                  フィードバック判断用サムネイル
                </div>
              </div>
            ` : ""}
            <div class="meta">
              ${segment.padded_start_sec.toFixed(3)}s - ${segment.padded_end_sec.toFixed(3)}s /
              score=${segment.score.toFixed(4)} / max=${segment.max_score.toFixed(4)}
              ${segment.metadata?.thumbnail_error ? `<br>thumbnail error: ${escapeHtml(segment.metadata.thumbnail_error)}` : ""}
            </div>
            <div class="actions">
              <button class="secondary" data-feedback-label="positive" data-feedback-segment="${segment.id}" data-feedback-detection="${segment.detection_result_id}">正しい</button>
              <button class="secondary" data-feedback-label="negative" data-feedback-segment="${segment.id}" data-feedback-detection="${segment.detection_result_id}">誤検出</button>
              <button class="secondary" data-feedback-label="ignore" data-feedback-segment="${segment.id}" data-feedback-detection="${segment.detection_result_id}">無視</button>
            </div>
          </div>
        `).join("") || "<p>シーン区間はありません。</p>";
        $("segmentsList").querySelectorAll("[data-feedback-label]").forEach((button) => {
          button.addEventListener("click", async () => {
            await createFeedback(
              Number(button.dataset.feedbackDetection),
              Number(button.dataset.feedbackSegment),
              button.dataset.feedbackLabel,
            );
          });
        });
      }

      $("loadSegments").addEventListener("click", async () => {
        try {
          await loadSegments();
        } catch (error) {
          print("detectionResult", error.message);
        }
      });

      async function createFeedback(detectionId, segmentId, label) {
        try {
          const data = await api("/api/v1/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              detection_id: detectionId,
              segment_id: segmentId,
              label,
              source: "web_ui",
            }),
          });
          $("feedbackDetectionId").value = detectionId;
          print("feedbackResult", data);
          await loadFeedback();
        } catch (error) {
          print("feedbackResult", error.message);
        }
      }

      async function loadFeedback() {
        const detectionId = Number($("feedbackDetectionId").value);
        const feedback = await api(`/api/v1/feedback?detection_id=${detectionId}`);
        $("feedbackList").innerHTML = feedback.map((item) => `
          <div class="item">
            <h3>Feedback ${item.id} / ${item.label}</h3>
            <div class="meta">
              detection_id=${item.detection_result_id} / segment_id=${item.segment_id ?? "-"} /
              model_version_id=${item.model_version_id}<br>
              ${item.start_sec !== null ? `${item.start_sec.toFixed(3)}s - ${item.end_sec.toFixed(3)}s` : "-"} /
              source=${escapeHtml(item.source)}
            </div>
          </div>
        `).join("") || "<p>フィードバックはまだありません。</p>";
      }

      $("loadFeedback").addEventListener("click", async () => {
        try {
          await loadFeedback();
        } catch (error) {
          print("feedbackResult", error.message);
        }
      });

      $("createExport").addEventListener("click", async () => {
        try {
          const data = await api("/api/v1/exports", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              detection_id: Number($("exportDetectionId").value),
              mode: $("exportMode").value,
            }),
          });
          await pollJob(data.id, "exportResult");
          await loadExports();
        } catch (error) {
          print("exportResult", error.message);
        }
      });

      async function loadExports() {
        const exports = await api("/api/v1/exports");
        $("exportsList").innerHTML = exports.map((item) => `
          <div class="item">
            <h3>Export ${item.id} / ${item.status} / ${item.mode}</h3>
            <div class="meta">
              detection_id=${item.detection_result_id} / segment_id=${item.segment_id ?? "-"}<br>
              ${escapeHtml(item.output_path || "-")}${item.asset_error_message ? `<br>preview error: ${escapeHtml(item.asset_error_message)}` : ""}
            </div>
            <div class="media">
              ${item.thumbnail_url ? `<a href="${escapeHtml(item.thumbnail_url)}" target="_blank"><img src="${escapeHtml(item.thumbnail_url)}" alt="サムネイル"></a>` : "<p>サムネイルなし</p>"}
              ${item.preview_url ? `<video src="${escapeHtml(item.preview_url)}" controls preload="metadata"></video>` : "<p>プレビューなし</p>"}
            </div>
            <div class="actions">
              ${item.output_url ? `<a href="${escapeHtml(item.output_url)}" target="_blank">出力動画を開く</a>` : ""}
            </div>
          </div>
        `).join("") || "<p>出力はまだありません。</p>";
      }

      $("loadExports").addEventListener("click", async () => {
        try {
          await loadExports();
        } catch (error) {
          print("exportResult", error.message);
        }
      });

      refreshSystemStatus();
      loadJobs().catch(() => {});
      loadStorage().catch(() => {});
      loadDetections().catch(() => {});
      loadExports().catch(() => {});
      loadFeedback().catch(() => {});
    </script>
  </body>
</html>
