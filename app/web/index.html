<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Scene Detector</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Yu Gothic", "Meiryo", Arial, Helvetica, sans-serif;
        background: #f7f7f4;
        color: #202124;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 32px 24px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid #d8d8d2;
        padding-bottom: 20px;
      }
      h1 {
        font-size: 28px;
        line-height: 1.2;
        margin: 0;
      }
      .status {
        border: 1px solid #c7d7c3;
        background: #eef6eb;
        border-radius: 8px;
        padding: 12px 14px;
        min-width: 180px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 24px;
      }
      section {
        border: 1px solid #d8d8d2;
        border-radius: 8px;
        background: #ffffff;
        padding: 16px;
      }
      h2 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      p {
        color: #5f6368;
        line-height: 1.5;
        margin: 0;
      }
      code {
        background: #eeeeea;
        border-radius: 4px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI Scene Detector</h1>
          <p>学習動画、特徴量抽出、モデル生成の基盤が起動しています。</p>
        </div>
        <div class="status" id="health">API状態を確認中...</div>
      </header>
      <div class="grid">
        <section>
          <h2>学習</h2>
          <p>学習動画を登録し、OpenCLIP特徴量を生成します。</p>
        </section>
        <section>
          <h2>検出</h2>
          <p>対象動画をアップロードし、モデルの有効バージョンでフレーム推論します。</p>
        </section>
        <section>
          <h2>モデル</h2>
          <p>モデルバージョンは変更不可として保存し、有効バージョンを管理します。</p>
        </section>
        <section>
          <h2>設定</h2>
          <p>保存先、ffmpeg、CUDA、バッチサイズなどの既定値を一元管理します。</p>
        </section>
      </div>
    </main>
    <script>
      fetch("/api/v1/health")
        .then((response) => response.json())
        .then((payload) => {
          const data = payload.data;
          document.getElementById("health").textContent =
            `API ${data.status.toUpperCase()} / DB ${data.database.toUpperCase()}`;
        })
        .catch(() => {
          document.getElementById("health").textContent = "APIに接続できません";
        });
    </script>
  </body>
</html>
